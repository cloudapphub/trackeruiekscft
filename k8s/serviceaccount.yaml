---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpi-tracker-sa
  namespace: gpi-tracker
  labels:
    app.kubernetes.io/name: gpi-tracker
    app.kubernetes.io/component: serviceaccount
  annotations:
    # EKS Pod Identity - no OIDC annotation needed (unlike IRSA)
    # The association is defined in CloudFormation 04-eks-cluster.yaml
    eks.amazonaws.com/pod-identity-role: "gpi-tracker-pod-role"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-load-balancer-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/name: aws-load-balancer-controller
    app.kubernetes.io/component: controller
  annotations:
    # Pod Identity association defined in 04-eks-cluster.yaml
    eks.amazonaws.com/pod-identity-role: "gpi-tracker-alb-controller-role"
